<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Windows Server</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>📚 Tuto IT</h2>
  <a href="index.html">Accueil</a>
  <a href="windows-server.html">Windows Server</a>
  <a href="hyper-v.html">Hyper-V</a>
  <a href="about.html">À propos</a>
</div>

<div class="main">

  <div class="marquee">
    <span class="date" id="date"></span>
    <p>🚀 Nouveautés : AD DS • Hyper-V • Windows Server</p>
  </div>

  <header>
    <h1>Windows Server</h1>
  </header>

  <div class="container">
    <h2>Tutoriels Windows Server</h2>
    <ul id="wsList"></ul>
  </div>

</div>

<script>
// DATE
const dateElement = document.getElementById("date");
const today = new Date();
dateElement.textContent = "📅 " + today.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });

// BASE DE DONNÉES (la même que le dashboard)
const tutorials = [
  { title: "Installation Windows Serveur", link: "installation-windows-server.html", category: "Windows" },
  { title: "Installation du rôle AD DS", link: "installation-ad-ds.html", category: "Windows" },
  { title: "Utilisation Hyper-V", link: "hyper-v.html", category: "Virtualisation" }
];

// FILTRE WINDOWS
const list = document.getElementById("wsList");

tutorials
  .filter(t => t.category === "Windows")
  .forEach(t => {
    const li = document.createElement("li");
    li.innerHTML = `<a href="${t.link}">${t.title}</a>`;
    list.appendChild(li);
  });
</script>

</body>
</html>
