<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tuto IT - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>📚 Tuto IT</h2>
  <a href="index.html">Accueil</a>
  <a href="windows-server.html">Windows Server</a>
  <a href="hyper-v.html">Hyper-V</a>
  <a href="linux.html">Linux</a>
  <a href="about.html">À propos</a>
</div>

<div class="marquee">
  <span class="date" id="date"></span>
  <div class="marquee-text">
    🚀 Nouveautés : AD DS • Debian CLI • Hyper-V • Windows Server
  </div>
</div>

  <header>
    <h1>Dashboard des tutoriels</h1>
  </header>

  <div class="container dashboard" id="dashboardList">
    <!-- Les cartes des tutoriels seront générées automatiquement ici -->
  </div>
</div>

<script>
// DATE AUTOMATIQUE
const dateElement = document.getElementById("date");
const today = new Date();
dateElement.textContent = "📅 " + today.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });

// BASE DE DONNÉES DES TUTORIELS
const tutorials = [
  { title: "Installation Windows Serveur", link: "installation-windows-server.html", category: "Windows", views: 10 },
  { title: "Installation du rôle AD DS", link: "installation-ad-ds.html", category: "Windows", views: 5 },
  { title: "Utilisation Hyper-V", link: "hyper-v.html", category: "Virtualisation", views: 3 },
  { title: "Installation Debian CLI", link: "installation-debian-cli.html", category: "Linux", views: 0 }
];

// GENERATION AUTOMATIQUE DES CARTES
const dashboard = document.getElementById("dashboardList");
tutorials.forEach(t => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h3>${t.title}</h3>
                    <p class="muted">${t.category}</p>
                    <a href="${t.link}">Voir le tutoriel ➡</a>`;
  dashboard.appendChild(card);
});
</script>

</body>
</html>
